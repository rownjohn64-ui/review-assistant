<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Assistant — Умная обработка отзывов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #e6b800;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: rgba(230,184,0,0.8);
            text-align: center;
            margin-bottom: 40px;
        }
        .card {
            background: #2d2d2d;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            border: 1px solid #e6b800;
        }
        .card h3 {
            color: #e6b800;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e6b800;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e6b800;
            border-radius: 10px;
            font-size: 1rem;
            background: #1a1a1a;
            color: #f0f0f0;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ffcc00;
            box-shadow: 0 0 5px rgba(230,184,0,0.5);
        }
        button {
            background: linear-gradient(135deg, #e6b800 0%, #ccaa00 100%);
            color: #1a1a1a;
            font-weight: bold;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #ffcc00 0%, #e6b800 100%);
        }
        .review-list {
            margin-top: 30px;
        }
        .review-item {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #e6b800;
        }
        .review-author {
            font-weight: bold;
            color: #e6b800;
        }
        .review-content {
            margin: 10px 0;
            color: #d0d0d0;
        }
        .review-status {
            font-size: 0.85rem;
            color: #888;
        }
        .sentiment {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .sentiment.positive { background: #e6b800; color: #1a1a1a; font-weight: bold; }
        .sentiment.negative { background: #8b0000; color: #fff; }
        .sentiment.neutral { background: #555; color: #e6b800; }
        .comment {
            background: #2d2d2d;
            border-left: 3px solid #e6b800;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
        }
        .comment-author {
            font-size: 0.85rem;
            color: #e6b800;
            font-weight: bold;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e6b800;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Review Assistant</h1>
        <div class="subtitle">Умная обработка отзывов с AI-ответами</div>

        <div class="card">
            <h3>📝 Оставить отзыв</h3>
            <form id="reviewForm">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" id="author" required placeholder="Ваше имя">
                </div>
                <div class="form-group">
                    <label>Оценка (1-5)</label>
                    <select id="rating">
                        <option value="">Не выбрано</option>
                        <option value="5">5 - Отлично</option>
                        <option value="4">4 - Хорошо</option>
                        <option value="3">3 - Средне</option>
                        <option value="2">2 - Плохо</option>
                        <option value="1">1 - Ужасно</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Отзыв</label>
                    <textarea id="content" required placeholder="Напишите ваш отзыв..."></textarea>
                </div>
                <button type="submit">Отправить отзыв</button>
            </form>
        </div>

        <div class="card">
            <h3>📋 Последние отзывы</h3>
            <div id="reviews" class="review-list">
                <div style="text-align: center; color: #888;">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadReviews() {
            const response = await fetch('/api/reviews?limit=20');
            let reviews = await response.json();
            reviews.sort((a, b) => b.id - a.id);

            const container = document.getElementById('reviews');
            if (reviews.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #888;">Пока нет отзывов</div>';
                return;
            }

            container.innerHTML = '';
            for (const review of reviews) {
                const reviewDiv = document.createElement('div');
                reviewDiv.className = 'review-item';

                let sentimentHtml = '';
                if (review.sentiment) {
                    let sentimentText = '';
                    if (review.sentiment === 'positive') sentimentText = '😊 Положительный';
                    else if (review.sentiment === 'negative') sentimentText = '😞 Негативный';
                    else sentimentText = '😐 Нейтральный';
                    sentimentHtml = `<div class="sentiment ${review.sentiment}">${sentimentText}</div>`;
                }

                reviewDiv.innerHTML = `
                    <div class="review-author">${escapeHtml(review.author)}</div>
                    <div class="review-content">${escapeHtml(review.content)}</div>
                    <div class="review-status">Статус: ${review.status} | ${new Date(review.created_at).toLocaleString()}</div>
                    ${sentimentHtml}
                    <div id="comments-${review.id}"></div>
                `;
                container.appendChild(reviewDiv);

                loadComments(review.id);
            }
        }

        async function loadComments(reviewId) {
            const response = await fetch(`/api/comments/${reviewId}`);
            const comments = await response.json();

            const container = document.getElementById(`comments-${reviewId}`);
            if (!container) return;

            if (comments.length === 0) return;

            let html = '<hr><strong>💬 Ответы:</strong>';
            for (const comment of comments) {
                html += `
                    <div class="comment">
                        <div class="comment-author">${escapeHtml(comment.author)}</div>
                        <div>${escapeHtml(comment.content)}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const author = document.getElementById('author').value;
            const rating = document.getElementById('rating').value;
            const content = document.getElementById('content').value;

            const data = { author, content };
            if (rating) data.rating = parseInt(rating);

            const response = await fetch('/api/reviews', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('✅ Отзыв отправлен!');
                document.getElementById('reviewForm').reset();
                setTimeout(() => loadReviews(), 2000);
            } else {
                alert('❌ Ошибка при отправке');
            }
        });

        loadReviews();
        setInterval(loadReviews, 15000);
    </script>
</body>
</html>
